name: Performance / lab report
description: Share speed results, regressions, lab evidence, or VM acceptance results.
title: "[Performance]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for benchmark results, performance regressions, scheduler comparisons, and lab or VM acceptance evidence.

        Please redact secrets, private keys, private hostnames, and private IPs you do not want to share.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What did you measure, and what looks good or wrong?
      placeholder: Example: TCP-over-WireGuard-over-Gatherlink regressed on fiber+5G, or VM acceptance passed with 3 paths.
    validations:
      required: true
  - type: dropdown
    id: report_type
    attributes:
      label: Report type
      options:
        - Performance result
        - Performance regression
        - Scheduler comparison
        - Lab or VM acceptance
        - Other
    validations:
      required: true
  - type: textarea
    id: topology
    attributes:
      label: Topology and paths
      description: Include path count, path speeds, MTU, RTT, jitter, loss, shaping, and whether this is real-world, VM, WSL, or local lab.
      placeholder: |
        environment: Hyper-V Debian VMs / WSL / real world
        path-a: 300 Mbit/s, MTU 1500, RTT ..., jitter ..., loss ...
        path-b: ...
    validations:
      required: true
  - type: textarea
    id: method
    attributes:
      label: Test method
      description: Commands, profile names, scheduler, duration, traffic type, payload/MTU, and comparison baseline.
      render: text
      placeholder: |
        gatherlink ...
        iperf3 ...
        scheduler: coordinated_adaptive
        baseline: direct WireGuard path-set / raw Gatherlink / userspace WireGuard
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Results and evidence
      description: Include throughput, delivery %, drops, retransmits, CPU, diagnostics JSONL snippets, monitor output, or report paths.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gatherlink version or commit
      placeholder: v0.9.3 or git commit hash
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Debian version, kernel version, CPU, VM/bare metal
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private keys, tokens, passwords, private hostnames, and private IPs I do not want to share.
          required: true
