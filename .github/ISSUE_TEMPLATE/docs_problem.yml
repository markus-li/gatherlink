name: Documentation problem
description: Report unclear, stale, missing, or broken documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or section
      placeholder: Link to the doc or page section
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
      placeholder: Broken link, stale behavior, unclear step, missing scenario, etc.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: Optional, but helpful.
