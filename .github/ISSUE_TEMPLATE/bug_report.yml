name: Bug, docs, or performance report
description: Report a bug, documentation problem, performance result, or regression.
title: "[Report]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this for bugs, stale or unclear documentation, performance results, performance regressions, scheduler comparisons, and lab or VM acceptance reports.

        Please remove secrets, private keys, tokens, public IPs you do not want to share, and private hostnames before submitting.
  - type: dropdown
    id: report_type
    attributes:
      label: Report type
      options:
        - Bug or incorrect behavior
        - Documentation problem
        - Performance result
        - Performance regression
        - Scheduler or lab report
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe what happened, what is unclear, or what you measured.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details, steps, or test method
      description: Include steps, commands, config shape, docs page, benchmark profile, scheduler, MTU, path speeds, or comparison baseline when relevant.
      placeholder: |
        steps or command:
        environment/topology:
        expected result:
        actual result:
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gatherlink version or commit
      placeholder: v0.9.3 or git commit hash
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Debian version, kernel version, VM/WSL/bare metal
  - type: textarea
    id: logs
    attributes:
      label: Relevant output, links, or results
      description: Paste redacted logs, diagnostics JSONL snippets, monitor output, error text, docs links, throughput, delivery %, drops, retransmits, CPU, or report paths.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private keys, tokens, passwords, private hostnames, and private IPs I do not want to share.
          required: true
